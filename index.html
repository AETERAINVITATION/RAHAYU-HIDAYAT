<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

html,body{
  overflow-x:hidden;
  background:#000;
  color:#fff;
}

/* OPENING */
#opening{
  position:fixed;
  width:100%;
  height:100vh;
  background:#000;
  z-index:99999;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

#guest{
  margin-bottom:25px;
  font-size:18px;
  z-index:2; /* FIX AGAR SELALU DI ATAS */
}

/* DOOR */
.door{
  position:absolute;
  width:50%;
  height:100%;
  object-fit:cover;
  pointer-events:none;
  transition:1.2s;
  z-index:1;
}
.left{left:0;}
.right{right:0;}
.open .left{transform:translateX(-100%);}
.open .right{transform:translateX(100%);}

/* BUTTON */
.open-btn,.copy-btn{
  padding:12px 28px;
  border-radius:40px;
  border:1px solid rgba(212,191,163,0.7);
  background:rgba(0,0,0,0.5);
  color:#d4bfa3;
  backdrop-filter:blur(6px);
  cursor:pointer;
  z-index:2;
}

/* SECTION */
.section{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  transform:translateY(40px);
  transition:0.8s;
}
.section.show{opacity:1;transform:translateY(0);}

/* VIDEO */
.video-wrap{
  position:relative;
  width:100%;
  height:100vh;
  overflow:hidden;
}

.video-bg{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  filter:blur(12px) brightness(0.5);
  transform:scale(1.1);
}

.video-main{
  position:relative;
  width:100%;
  height:100%;
  object-fit:contain;
}

/* BG */
.bg-section{
  position:relative;
  background:url('backgrong.jpg') center/cover no-repeat;
}
.bg-section::before{
  content:'';
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
}

.inner{
  position:relative;
  z-index:2;
  max-width:800px;
  width:100%;
  margin:auto;
  text-align:center;
}

/* GALERI */
.gallery{
  max-width:400px;
  margin:auto;
  overflow:hidden;
}
.gallery-track{
  display:flex;
  transition:0.4s;
}
.gallery img{
  width:100%;
  border-radius:16px;
}

/* MAP */
.map-container{
  width:100%;
  max-width:600px;
  height:300px;
  margin:auto;
  border-radius:16px;
  overflow:hidden;
}

/* FLOWER */
.flower{
  position:fixed;
  top:-20px;
  width:10px;
  height:10px;
  background:#d4bfa3;
  border-radius:50%;
  opacity:0.4;
  animation:fall linear infinite;
}

@keyframes fall{
  to{transform:translateY(110vh);} 
}

.credit{
  text-align:center;
  padding:20px;
  font-size:12px;
  color:#aaa;
}
</style>
</head>

<body>

<audio id="music" src="music.mp3" loop></audio>

<script>
for(let i=0;i<10;i++){
  let f=document.createElement("div");
  f.className="flower";
  f.style.left=Math.random()*100+"%";
  f.style.animationDuration=(6+Math.random()*4)+"s";
  document.body.appendChild(f);
}
</script>

<!-- OPENING -->
<div id="opening">
  <img src="door-left.png" class="door left">
  <img src="door-right.png" class="door right">

  <div id="guest">
    Kepada Yth.<br>
    <strong id="guestName">Tamu Undangan</strong>
  </div>

  <button class="open-btn" onclick="openInvite()">BUKA UNDANGAN</button>
</div>

<div id="content">

<script>
for(let i=1;i<=8;i++){
  document.write(`
  <div class="section">
    <div class="video-wrap">
      <video class="video-bg" src="${i}.mp4" muted autoplay loop playsinline></video>
      <video class="video-main" src="${i}.mp4" muted playsinline></video>
    </div>
  </div>
  `);
}
</script>

<!-- GALERI -->
<div class="section bg-section">
  <div class="inner">
    <div class="gallery">
      <div class="gallery-track" id="track">
        <img src="GALERI (1).jpg">
        <img src="GALERI (2).jpg">
        <img src="GALERI (3).jpg">
        <img src="GALERI (4).jpg">
        <img src="GALERI (5).jpg">
        <img src="GALERI (6).jpg">
      </div>
    </div>
  </div>
</div>

<!-- MAP -->
<div class="section bg-section">
  <div class="inner">
    <div class="map-container">
      <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d3957.6175213126808!2d112.43305!3d-7.2842848" width="100%" height="100%" style="border:0;"></iframe>
    </div>
  </div>
</div>

</div>

<div class="credit">© TheWeddingOfReygita&Kautsar</div>

<script>

/* NAMA TAMU */
const params=new URLSearchParams(window.location.search);
if(params.get("to")){
  document.getElementById("guestName").innerText=params.get("to");
}

/* OPEN */
function openInvite(){
  document.getElementById("opening").classList.add("open");

  let music=document.getElementById("music");
  music.volume=0;
  music.play();

  let fade=setInterval(()=>{
    if(music.volume<1) music.volume+=0.05;
    else clearInterval(fade);
  },200);

  setTimeout(()=>{
    document.getElementById("opening").style.display="none";
  },1200);
}

/* VIDEO CONTROL */
const sections=document.querySelectorAll('.section');
const videos=document.querySelectorAll('.video-main');

videos.forEach((v,i)=>{
  v.onended=()=>{
    if(sections[i+1]) sections[i+1].scrollIntoView({behavior:'smooth'});
  }
});

const obs=new IntersectionObserver(e=>{
  e.forEach(x=>{
    let v=x.target.querySelector(".video-main");
    if(x.isIntersecting){
      x.target.classList.add("show");
      if(v){v.currentTime=0;v.play();}
    }else{
      if(v){v.pause();}
    }
  });
},{threshold:0.6});

sections.forEach(s=>obs.observe(s));

/* GALERI */
let index=0,total=6;
const track=document.getElementById("track");

setInterval(()=>{
  index=(index+1)%total;
  track.style.transform=`translateX(-${index*100}%)`;
},3000);

</script>

</body>
</html>
